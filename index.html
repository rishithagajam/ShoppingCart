<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="cart-toggle-btn" onclick="toggleCart()">🛒</button>
    <button class="toast" id="toast">Product Added</button>
   <div class="left">
    <span class="s1">🛒 Shopping Cart</span><br>
    <input type="text" placeholder="search products..." oninput="searchProducts()" id="search"/>
    <div class="products" id="products">
        <div class="product">
            <img  class="img1" src="/images/1.png" alt="">
            <p class="p1">Hertfoid Upholstered Chair</p>
            <p class="p2">$120</p>
            <button class="add">Add to Cart</button>
        </div>
    </div>
   </div>
   <div class="cart">
    <span class="s2">🛍️ Your Cart</span>
    <div class="cart-c" id="cart-c"></div>
        <p class="total" id="total">Total:$0</p>
   </div> 
   <script src="script.js"></script>
</body>
</html>
